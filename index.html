<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt‑Battle – Pink</title>
  <!--
    Variante in Pink. Diese Datei ist im Wesentlichen identisch mit der gelben
    Version, verwendet jedoch eine andere Hintergrundfarbe. Große Schrift und
    schwarzer Rand orientieren sich am hochgeladenen Foto des Nutzers.
  -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    API‑Schlüssel‑Dialog: Beim ersten Start oder über Ctrl+K kann der
    persönliche OpenAI‑API‑Schlüssel eingegeben werden. Der Schlüssel
    wird nur im lokalen Speicher des Browsers gespeichert. Ohne gültigen
    Schlüssel können keine Bilder generiert werden.
  -->
  <div id="apiKeyModal" class="modal">
    <div class="modal-content">
      <h2>OpenAI API‑Schlüssel</h2>
      <p>
        Bitte gib deinen persönlichen OpenAI‑API‑Schlüssel ein. Der Schlüssel wird
        ausschließlich im lokalen Speicher deines Browsers gespeichert, damit du
        ihn nicht jedes Mal erneut eingeben musst. Ohne gültigen Schlüssel können
        keine Antworten generiert werden.
      </p>
      <input type="password" id="apiKeyInput" placeholder="sk‑..." />
      <button id="saveApiKey">Speichern</button>
    </div>
  </div>
  <!--
       Hauptbereich mit Logo und Eingabefeld: Das Logo des Digitalen
       Innovationszentrums wird oben links angezeigt. Darunter befindet sich
       das großflächige Eingabefeld. Der gesamte Container erstreckt sich
       über die volle Höhe des Bildschirms. Durch Drücken der Enter‑Taste
       wird der Prompt abgeschickt.
  -->
  <div class="main-container">
    <img id="logo" src="logo.png" alt="Logo des Digitalen Innovationszentrums" />
    <!-- Eingabefeld für den neuen Prompt. Es steht direkt unter dem Logo,
         sodass es sofort ins Auge fällt. Durch Drücken der Enter‑Taste wird
         der Inhalt an die API gesendet. -->
    <textarea id="prompt" class="full-input" autocomplete="off" autofocus></textarea>
    <!-- Nachrichtenbereich: Hier werden die abgeschickten Prompts sowie die
         generierten Bilder in chronologischer Reihenfolge angezeigt. -->
    <div id="messages" class="messages"></div>
  </div>
  <!-- Ergebnis‑Overlay: Hier werden generierte Bilder oder Fehlermeldungen
       angezeigt. Das Overlay erscheint temporär über dem Eingabebereich. -->
  <div id="resultModal" class="result-modal">
    <div class="result-content" id="resultContent"></div>
  </div>

  <!--
    Unterer Bereich zur Eingabe des API‑Schlüssels. Dieser Bereich ist
    jederzeit sichtbar und erlaubt das Speichern eines neuen Schlüssels.
    Sobald ein Schlüssel vorhanden ist, wird er im Passwortfeld vorausgefüllt.
    Durch Drücken von Enter oder den Button „Speichern“ wird der Schlüssel im
    lokalen Speicher abgelegt.
  -->
  <div id="apiKeyBar">
    <input type="password" id="apiKeyBarInput" placeholder="OpenAI API‑Schlüssel eingeben …" />
    <button id="saveApiKeyBar">Speichern</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
