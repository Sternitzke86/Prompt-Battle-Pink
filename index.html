<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt‑Battle – Pink</title>
  <!--
    Variante in Pink. Diese Datei ist im Wesentlichen identisch mit der gelben
    Version, verwendet jedoch eine andere Hintergrundfarbe. Große Schrift und
    schwarzer Rand orientieren sich am hochgeladenen Foto des Nutzers.
  -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="apiKeyModal" class="modal">
    <div class="modal-content">
      <h2>OpenAI API‑Schlüssel</h2>
      <p>
        Bitte gib deinen persönlichen OpenAI API‑Schlüssel ein. Der Schlüssel wird
        ausschließlich im lokalen Speicher deines Browsers gespeichert, damit du
        ihn nicht jedes Mal erneut eingeben musst. Ohne gültigen Schlüssel können
        keine Antworten generiert werden.
      </p>
      <input type="password" id="apiKeyInput" placeholder="sk‑..." />
      <button id="saveApiKey">Speichern</button>
    </div>
  </div>
  <!--
       Hauptbereich mit Logo und Eingabefeld: Das Logo des Digitalen
       Innovationszentrums wird oben links angezeigt. Darunter befindet sich
       das großflächige Eingabefeld. Der gesamte Container erstreckt sich
       über die volle Höhe des Bildschirms. Durch Drücken der Enter‑Taste
       wird der Prompt abgeschickt.
  -->
  <div class="main-container">
    <img id="logo" src="logo.png" alt="Logo des Digitalen Innovationszentrums" />
    <textarea id="prompt" class="full-input" autocomplete="off" autofocus></textarea>
  </div>
  <!-- Ergebnis‑Overlay: Hier werden generierte Bilder oder Fehlermeldungen
       angezeigt. Das Overlay erscheint temporär über dem Eingabebereich. -->
  <div id="resultModal" class="result-modal">
    <div class="result-content" id="resultContent"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
